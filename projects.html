        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow: auto;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--bg-card);
            margin: 10% auto;
            padding: 2rem;
            border: 1px solid var(--neon-blue);
            width: 80%;
            max-width: 800px;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 0 30px var(--neon-glow-blue);
            animation: modalOpen 0.4s ease;
        }

        @keyframes modalOpen {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-modal {
            color: var(--text-muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-modal:hover {
            color: var(--neon-purple);
        }

        .modal-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            background: #222;
        }

        /* Fix centering for section title */
        .section-title {
            left: auto;
            display: table;
            margin: 0 auto 3rem auto;
        }
    </style>
</head>
